<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>BayarSendiri - Solusi Tagihan Digital</title>
  
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- jsPDF & QRCode libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <i class="fas fa-wallet"></i> BayarSendiri
      </div>
      <div class="header-actions">
        <button id="darkToggle" class="icon-btn" aria-label="Toggle dark mode">
          <i class="fas fa-moon"></i>
        </button>
        <button id="profileBtn" class="icon-btn" aria-label="Profile">
          <i class="fas fa-user-circle"></i>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content" id="mainContent">
      <!-- Dynamic content -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="dashboard">
        <i class="fas fa-home"></i>
        <span>Beranda</span>
      </button>
      <button class="nav-item" data-view="tagihan">
        <i class="fas fa-file-invoice"></i>
        <span>Tagihan</span>
      </button>
      <button class="nav-item" data-view="spp">
        <i class="fas fa-graduation-cap"></i>
        <span>Kuliah</span>
      </button>
      <button class="nav-item" data-view="pulsa">
        <i class="fas fa-mobile-alt"></i>
        <span>Pulsa</span>
      </button>
      <button class="nav-item" data-view="riwayat">
        <i class="fas fa-history"></i>
        <span>Riwayat</span>
      </button>
    </nav>
  </div>

  <!-- Custom JavaScript -->
  <script src="js/script.js"></script>
</body>
</html>
